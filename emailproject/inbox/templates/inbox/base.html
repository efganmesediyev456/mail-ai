<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Email Inbox{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-hover: #22252f;
            --surface-raised: #252836;
            --border: rgba(255,255,255,0.06);
            --border-light: rgba(255,255,255,0.1);
            --text: #e4e6eb;
            --text-secondary: #8b8fa3;
            --text-muted: #5c6072;
            --accent: #6c5ce7;
            --accent-light: #a29bfe;
            --accent-glow: rgba(108,92,231,0.15);
            --green: #00b894;
            --green-light: #55efc4;
            --green-glow: rgba(0,184,148,0.12);
            --orange: #fdcb6e;
            --orange-glow: rgba(253,203,110,0.12);
            --red: #ff6b6b;
            --red-glow: rgba(255,107,107,0.1);
            --blue: #74b9ff;
            --blue-glow: rgba(116,185,255,0.12);
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 24px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.2);
            --font: 'DM Sans', sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient background glow */
        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 600px;
            background: radial-gradient(ellipse, rgba(108,92,231,0.08) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 32px 24px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--text) 0%, var(--accent-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 4px;
            font-weight: 400;
            -webkit-text-fill-color: var(--text-muted);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            font-family: var(--font);
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            letter-spacing: 0.2px;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 2px 12px rgba(108,92,231,0.3);
        }
        .btn-primary:hover {
            background: #7c6df0;
            box-shadow: 0 4px 20px rgba(108,92,231,0.4);
            transform: translateY(-1px);
        }

        .btn-success {
            background: var(--green);
            color: #0f1117;
            font-weight: 700;
            box-shadow: 0 2px 12px rgba(0,184,148,0.25);
        }
        .btn-success:hover {
            background: var(--green-light);
            box-shadow: 0 4px 20px rgba(0,184,148,0.35);
            transform: translateY(-1px);
        }

        .btn-ghost {
            background: var(--surface);
            color: var(--text-secondary);
            border: 1px solid var(--border-light);
        }
        .btn-ghost:hover {
            background: var(--surface-hover);
            color: var(--text);
            border-color: rgba(255,255,255,0.15);
        }

        .btn svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        /* Alerts */
        .alert {
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            margin-bottom: 16px;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideDown 0.3s ease;
        }

        .alert-success {
            background: var(--green-glow);
            color: var(--green-light);
            border: 1px solid rgba(0,184,148,0.2);
        }

        .alert-error {
            background: var(--red-glow);
            color: var(--red);
            border: 1px solid rgba(255,107,107,0.2);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Badge */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
<div class="container">
    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }}">
        <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
            {% if message.tags == 'success' %}
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
            {% else %}
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
            {% endif %}
        </svg>
        {{ message }}
    </div>
    {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
